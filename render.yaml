services:
  # Render free tier does not support `type: worker`.
  # Deploy as a web service with /health so Render keeps the process alive.
  # Optional: use UptimeRobot (free) to ping /health every 5 min on free tier.
  - type: web
    name: price-monitor-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: FACEBOOK_STORAGE_STATE_PATH
        value: /etc/secrets/facebook-storage-state.json
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: MOCK_MARKETPLACE
        value: "false"
